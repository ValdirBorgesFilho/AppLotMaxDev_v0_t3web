[server]
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 20
# ESTA LINHA É A MAIS IMPORTANTE PARA O CELULAR:
enableWebsocketCompression = false

[browser]
# Força o navegador a não tentar adivinhar o endereço
gatherUsageStats = false

[theme]
primaryColor = "#d33682"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"
